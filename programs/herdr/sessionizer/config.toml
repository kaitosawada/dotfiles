[projects]
# ghq host/owner layout: expand each owner, then list repos one level down
roots = ["~/ghq/*/*"]
git_only = true
depth = 1

[layout]
placement = "overlay"
focus = "nvim"

[tabs.dev]
label = "dev"

# Mirrors scripts/switch-project.sh herdr-apply-layout:
# left cursor-agent (40%) | right nvim (70%) over two empty panes (30%)
# herdr --ratio is the share the *source* pane keeps (not the new pane).
# Sessionizer docs say "new pane share" but herdr CLI keeps the source share.
[[tabs.dev.panes]]
id = "claude"
title = "claude"
command = "cursor-agent"

[[tabs.dev.panes]]
id = "nvim"
from = "claude"
title = "nvim"
split = "right"
ratio = 0.4
command = "nvim"

[[tabs.dev.panes]]
id = "term1"
from = "nvim"
title = "term"
split = "down"
ratio = 0.7

[[tabs.dev.panes]]
id = "term2"
from = "term1"
title = "term"
split = "right"
ratio = 0.5
